<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070c1a" />
      <stop offset="100%" stop-color="#141c30" />
    </linearGradient>
    <linearGradient id="u-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="orbit-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="100"/>
  
  <!-- Orbit Back -->
  <path d="M 130 250 C 130 180, 200 140, 280 140 C 370 140, 400 180, 390 230" fill="none" stroke="url(#orbit-grad)" stroke-width="12" stroke-linecap="round" opacity="0.6" />

  <!-- U Left Stem -->
  <path d="M 210 160 C 200 160, 190 180, 190 220 L 190 270 C 190 310, 210 330, 256 330" fill="none" stroke="url(#u-grad)" stroke-width="32" stroke-linecap="round" />
  
  <!-- Receipt Paper -->
  <path d="M 230 160 L 280 160 L 280 250 L 265 240 L 250 250 L 235 240 L 230 250 Z" fill="#ffffff" />
  <line x1="245" y1="185" x2="265" y2="185" stroke="#0a1128" stroke-width="5" stroke-linecap="round" />
  <line x1="245" y1="205" x2="265" y2="205" stroke="#0a1128" stroke-width="5" stroke-linecap="round" />
  <line x1="245" y1="225" x2="255" y2="225" stroke="#0a1128" stroke-width="5" stroke-linecap="round" />

  <!-- U Right Stem & Arrow -->
  <path d="M 256 330 C 300 330, 320 310, 320 270 L 320 210" fill="none" stroke="url(#u-grad)" stroke-width="32" stroke-linecap="round" />
  <polygon points="300,215 340,215 320,185" fill="#22d3ee" />

  <!-- Orbit Front -->
  <path d="M 152 230 C 130 290, 180 340, 220 350 C 280 365, 360 300, 370 260 C 380 220, 350 190, 330 185" fill="none" stroke="url(#orbit-grad)" stroke-width="14" stroke-linecap="round" filter="url(#glow)" />

  <!-- Stars -->
  <path d="M 150 190 Q 165 190 165 175 Q 165 190 180 190 Q 165 190 165 205 Q 165 190 150 190 Z" fill="#fde047" />
  <path d="M 180 150 Q 190 150 190 140 Q 190 150 200 150 Q 190 150 190 160 Q 190 150 180 150 Z" fill="#fde047" />
  <path d="M 350 140 Q 365 140 365 125 Q 365 140 380 140 Q 365 140 365 155 Q 365 140 350 140 Z" fill="#fde047" />
  <path d="M 330 330 Q 345 330 345 315 Q 345 330 360 330 Q 345 330 345 345 Q 345 330 330 330 Z" fill="#fde047" filter="url(#glow)" />

  <!-- Text -->
  <text x="256" y="420" font-family="sans-serif" font-size="52" font-weight="900" fill="#22d3ee" text-anchor="middle" letter-spacing="6">UNIVERSE</text>
  <text x="256" y="470" font-family="sans-serif" font-size="40" font-weight="900" fill="#3b82f6" text-anchor="middle" letter-spacing="3">POS<tspan fill="#22d3ee">✓</tspan></text>
</svg>
